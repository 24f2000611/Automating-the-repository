name: Daily Auto-Commit

on:
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC daily (specific hour/minute)

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo  # Pulls your code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Allows commits

      - name: Update status by 24f2000611@ds.study.iitm.ac.in  # Your required step
        run: |
          echo "Last updated: $(date -u)" > status.txt  # Creates/updates file

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.txt
          git commit -m "Daily update $(date -u)" || echo "No changes"
          git push
