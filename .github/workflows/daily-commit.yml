name: Daily Auto-Commit
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial for the 'git push' to work

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # Note: 'with: token:' is removed because @v4 does this automatically

      - name: Update status
        run: echo "Last updated: $(date)" > status.txt
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.txt
          git commit -m "Daily update: $(date)" || exit 0
          git push
